name: Build and Deploy WebApp (.NET 8)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/WebApp/WebApp.csproj  # Sửa nếu đường dẫn khác

      - name: Build
        run: dotnet build src/WebApp/WebApp.csproj --configuration Release --no-restore

      - name: Publish app
        run: dotnet publish src/WebApp/WebApp.csproj --configuration Release --output ./publish

      - name: Kiểm tra nội dung publish (tùy chọn debug)
        run: ls -R ./publish

      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: AnHoang  # Tên App Service
          slot-name: production
          package: ./publish
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
