name: Build and Deploy eShopOnAzure (.NET 8)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # B1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # B2. Setup .NET 8
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # B3. Restore dependencies
      - name: Restore dependencies
        run: dotnet restore src/WebApp/WebApp.csproj

      # B4. Build project
      - name: Build
        run: dotnet build src/WebApp/WebApp.csproj --configuration Release --no-restore

      # B5. Publish app
      - name: Publish app
        run: dotnet publish src/WebApp/WebApp.csproj --configuration Release --output ./publish

      # B6. Nén publish thành zip
      - name: Zip published app
        run: |
          cd publish
          zip -r ../publish.zip .

      # B7. Deploy to Azure Web App
      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: AnHoang   # ⚠️ Đổi thành tên App Service của bạn
          slot-name: production
          package: ./publish.zip
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
