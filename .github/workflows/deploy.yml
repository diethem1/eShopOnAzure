name: Build and Deploy eShop (.NET 8)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install .NET Aspire workload
        run: dotnet workload restore

      - name: Restore dependencies
        run: dotnet restore src/eShop.AppHost/eShop.AppHost.csproj

      - name: Build
        run: dotnet build src/eShop.AppHost/eShop.AppHost.csproj --configuration Release --no-restore

      - name: Publish app
        run: dotnet publish src/eShop.AppHost/eShop.AppHost.csproj --configuration Release --output ./publish

      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: AnHoang
          slot-name: production
          package: ./publish
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
