name: Build and Deploy eShopOnAzure (.NET 8)

on:
  push:
    branches:
      - main   # Deploy khi có code mới trên branch main
  workflow_dispatch:   # Cho phép chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # B1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # B2. Setup .NET 8
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # B3. Restore dependencies (chỉ cho Web project)
      - name: Restore dependencies
        run: dotnet restore src/Web/Web.csproj

      # B4. Build Web project
      - name: Build
        run: dotnet build src/Web/Web.csproj --configuration Release --no-restore

      # B5. Publish Web project
      - name: Publish app
        run: dotnet publish src/Web/Web.csproj --configuration Release --output ./publish --no-restore

      # B6. Deploy to Azure Web App
      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: AnHoang   # ⚠️ đổi thành tên App Service bạn đã tạo trong Azure
          slot-name: production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
